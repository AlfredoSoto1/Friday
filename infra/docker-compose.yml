services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=30
    mem_limit: 256m
    volumes:
      - friday-postgres:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    mem_limit: 384m
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

  webapp:
    build:
      context: ..
      dockerfile: infra/webapp.Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL
    restart: unless-stopped
    env_file:
      - ../.env
    mem_limit: 256m
    ports:
      - "${WEBAPP_PORT}:3000"
    depends_on:
      - app

  bot:
    build:
      context: ..
      dockerfile: infra/bot.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    mem_limit: 512m
    depends_on:
      - app

volumes:
  friday-postgres:
