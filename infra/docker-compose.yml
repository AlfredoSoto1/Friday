services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - friday-runtime-postgres:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: mcr.microsoft.com/devcontainers/universal:2
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      WATCHPACK_POLLING: "true"
    working_dir: /workspaces/friday
    volumes:
      - ..:/workspaces/friday:cached
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${WEBAPP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "dotnet restore backend &&
      npm install --prefix webapp &&
      (dotnet run --project backend --urls http://0.0.0.0:8080 &)
      && npm run dev --prefix webapp -- --hostname 0.0.0.0 --port 3000"

  agent:
    image: python:3.12-slim
    restart: unless-stopped
    env_file:
      - ../.env
    working_dir: /workspaces/friday
    volumes:
      - ..:/workspaces/friday:cached
    ports:
      - "${SLM_PORT:-8090}:8090"
    depends_on:
      app:
        condition: service_started
    command: >
      sh -lc "pip install --no-cache-dir -r bot/requirements.txt -r slm/requirements.txt &&
      (python -m bot.main &)
      && uvicorn slm.main:app --host 0.0.0.0 --port 8090"

volumes:
  friday-runtime-postgres:
