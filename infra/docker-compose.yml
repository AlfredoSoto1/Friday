services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - friday-runtime-postgres:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ../database/migrations/002_roster_user_fields.sql:/docker-entrypoint-initdb.d/002-roster-user-fields.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: mcr.microsoft.com/devcontainers/universal:2
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      WATCHPACK_POLLING: "true"
      ASPNETCORE_ENVIRONMENT: Production
      NODE_ENV: production
    working_dir: /workspaces/friday
    volumes:
      - ..:/workspaces/friday:cached
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${WEBAPP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "dotnet restore backend &&
      npm install --prefix webapp &&
      (dotnet run --project backend --urls http://0.0.0.0:8080 &) \
      && npm run dev --prefix webapp -- --hostname 0.0.0.0 --port 3000"

volumes:
  friday-runtime-postgres:
