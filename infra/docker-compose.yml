services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - friday-postgres:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: mcr.microsoft.com/dotnet/sdk:9.0-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    command: dotnet run --project Friday.Backend.csproj
    env_file: ../.env
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
    volumes:
      - ../backend:/app
      - backend-nuget:/root/.nuget/packages
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  webapp:
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm run build && npm start -- --hostname 0.0.0.0"
    env_file: ../.env
    environment:
      BACKEND_URL: http://app:8080
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - ../webapp:/app
      - webapp-modules:/app/node_modules
      - webapp-next:/app/.next
    ports:
      - "${WEBAPP_PORT:-3000}:3000"
    depends_on:
      app:
        condition: service_healthy

  bot:
    image: maven:3.9-eclipse-temurin-21
    restart: unless-stopped
    working_dir: /app
    command: sh -c "mvn --batch-mode --no-transfer-progress -DskipTests package && exec java -Xms64m -Xmx320m -XX:+UseG1GC -jar target/friday-bot-0.1.0-SNAPSHOT.jar"
    env_file: ../.env
    environment:
      BACKEND_URL: http://app:8080
      MAVEN_OPTS: -Xmx512m -XX:+UseSerialGC
    volumes:
      - ../bot:/app
      - bot-maven:/root/.m2
    depends_on:
      app:
        condition: service_healthy

volumes:
  friday-postgres:
  backend-nuget:
  webapp-modules:
  webapp-next:
  bot-maven:
