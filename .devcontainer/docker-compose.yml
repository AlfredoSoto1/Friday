services:
  so-workspace:
    image: mcr.microsoft.com/devcontainers/dotnet:9.0
    command: sleep infinity
    env_file:
      - ../.env
    user: vscode
    volumes:
      - ..:/workspaces/friday:cached
      - friday-dotnet-bin:/workspaces/friday/backend/bin
      - friday-webapp-node-modules:/workspaces/friday/webapp/node_modules
      - friday-webapp-next-cache:/workspaces/friday/webapp/.next
    working_dir: /workspaces/friday
    ports:
      - "3000:3000"
      - "8080:8080"
      - "8090:8090"
    depends_on:
      so-db:
        condition: service_healthy
    networks:
      so-network:
        aliases:
          - workspace
          - app
          - agent

  so-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - friday-dev-postgres:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      so-network:
        aliases:
          - db
          - postgres

volumes:
  friday-dev-postgres:
  friday-dotnet-bin:
  friday-webapp-node-modules:
  friday-webapp-next-cache:

networks:
  so-network:
    name: so-network
    driver: bridge
